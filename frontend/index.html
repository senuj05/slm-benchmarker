<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Local SLM Benchmarker</title>
</head>
<body>
    <header>
        <h1>Local SLM Benchmarker</h1>
        <p class="subheading"> Run AI entirely offline on your Mac. No internet, No cost. Compare 3 models.</p>
    </header>

    <!-- The 3 models -->
     <section id="models-section" >
        <p class="section-label">Choose a model</p>

        <div class="models-grid">
            
            <div class="model-card" id="card-0">
                <!-- model name -->
                <div class ="card-top">
                    <span class="model-name">llama3.2:1b</span>
                    <span class="tag tag-green">Fastest</span>
                </div>
                <!-- stats -->
                <div class="stats-row">
                    <div class="stats-box">
                        <p class="stats-label">Speed</p>
                        <p></p>
                    </div>
                </div>
            </div>
        </div>
     </section>

</body>
</html>
</html>
