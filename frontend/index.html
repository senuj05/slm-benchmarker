<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Local SLM Benchmarker</title>

    <link rel="stylesheet" href="styles.css" />
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">


</head>
<body>

    <aside class="sidebar">
        <div class="sidebar-top">
            <p class="sidebar-logo">SLM Benchmarker</p>
            <!-- <p class="sidebar-sub">Talk to your AI locally</p> -->
        </div>

        <nav>
            <div class="models">
                <p class="model-names">Models</p>
                <button class="nav-item">
                    <div class="model-icon-mistrel"></div>
                    <p class="model-mistrel">mistral:latest</p>
                </button>
                <button class="nav-item">
                    <div class="model-icon-llama"></div>      
                    <p class="model-llama">llama3.2:3b</p>
                </button>
                <button class="nav-item">
                    <div class="model-icon-phi4-mini "></div>
                    <p class="model-phi4-mini">phi-4-mini:latest</p>
                </button>

            </div>

            <div class="views">
                <p class="views-title">Views</p>
                <div class="views-items">
                    <button class="nav-item">chat+ run</button>
                    <button class="nav-item">benchmark</button>
                    <button class="nav-item" onclick="window.location.href='compare.html'" >compare all 3</button>
                </div>
            </div>

            <div class="navbar-bottom">
                <div class="status-row">
                    <div class="status-dot" id="ollama-icon"></div>
                    <span id="model-status">Model Running:</span>
                </div>
            </div>
        </nav>
    </aside>

    <main class="main-content">

        <!-- Top Bar -->
        <div class="chat-topbar">
            <div class="topbar-left">
                <span class="active-model" id="active-model-name">MISTREL: 7b</span>
            </div>
            <div class="topbar-right">
                <button class="topbar-btn" id="new-run-btn">new run</button>
                <button class="topbar-btn" id="compare-btn" onclick="window.location.href='compare.html'" >compare all 3</button>
            </div>
        </div>
        <!-- Metrics Strip -->
         <div class="metrics-strip">
            <div class="metric-card">
                <p class="metric-label">last tok/s</p>
                <p class="metric-value" id="metric-toks">17.1</p>
            </div>
            <div class="metric-card">
                <p class="metric-label">ttft</p>
                <p class="metric-value" id="metric-ttft">3.4s</p>
            </div>
            <div class="metric-card">
                <p class="metric-label">memory</p>
                <p class="metric-value" id="metric-memory">4.1 GB</p>
            </div>
         </div>

        <!-- Chat Area -->
        <div class="chat-messages" id="chat-messages">
            <div class="message">
                <div class="message-avatar">AI</div>
                <div class="message-body">
                    <p>Hello! How can I help you today?</p>
                </div>
            </div>
        </div>

        <!-- User input area -->
        <div class="chat-input-bar">
            <input type="text" class="chat-input" id="chat-input" placeholder="ask the ai something..." />
            <button class="send-btn" id="send-btn">&#8593;</button>
        </div>

    </main>


    <script src="app.js"></script>
</body>
</html>
