<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Local SLM Benchmarker</title>

    <link rel="stylesheet" href="styles.css" /> 
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">


</head>
<body>

    <aside class="sidebar">
        <div class="sidebar-top">
            <p class="sidebar-logo">SLM Benchmarker</p>
            <!-- <p class="sidebar-sub">Talk to your AI locally</p> -->
        </div>

        <nav>
            <div class="models">
                <p class="model-names">Models</p>
                <button class="nav-item">
                    <div class="model-icon-mistrel"></div>
                    <p class="model-mistrel">MISTREL</p>
                </button>
                <button class="nav-item">
                    <div class="model-icon-llama"></div>      
                    <p class="model-llama">LLAMA3.2:3b</p>
                </button>
                <button class="nav-item">
                    <div class="model-icon-phi4-mini "></div>
                    <p class="model-phi4-mini">PHI-4-MINI:latest</p>
                </button>

            </div>

            <div class="views">
                <p class="views-title">Views</p>
                <div class="views-items">
                    <button class="nav-item">chat+ run</button>
                    <button class="nav-item">benchmark</button>
                    <button class="nav-item">compare all 3</button>
                </div>
            </div>

            <div class="navbar-bottom">
                <div class="status-row">
                    <p class="status-text">Model Running:</p>
                    <div class="status-dot" id="ollama-icon"></div>
                    <span id="ollama-status">checking ollama...</span>
                </div>
            </div>
        </nav>
    </aside>

    <main class="main-content">

        <!-- Top Bar -->
        <div class="chat-topbar">
            <div class="topbar-left">
                <span class="active-model">MISTREL: 7b</span>
                <span class="model-tag"> best quality</span>
                <span class="speed-tag"> -14 tokens/s</span>
            </div>
            <div class="topbar-right">
                <button class="topbar-btn">new run</button>
                <button class="compare-btn">compare all 3</button>
            </div>
        </div>
        <!-- Metrics Strip -->
         <div class="metrics-strip">
            <div class="metric-card">
                <p class="metric-label">last tok/s</p>
                <p class="metric-value">17.1</p>
            </div>
            <div class="metric-card">
                <p class="metric-label">ttft</p>
                <p class="metric-value">3.4s</p>
            </div>
            <div class="metric-card">
                <p class="metric-label">memory</p>
                <p class="metric-value">4.1 GB</p>
            </div>
         </div>

        <!-- Chat Area -->
        <div class="chat-messages">
            <div class="message-avatar">AI</div>
            <div class="message-body">
                <p>Hello! How can I help you today?</p>
            </div>
        </div>

        <!-- User input area   -->
        <div class="chat-input-area">
            <input type="text" class="chat-input" placeholder="type your question..."></input>
            <button class="submit-btn">Submit</button>
        </div>

    </main>


</body>
</html>
</html>
